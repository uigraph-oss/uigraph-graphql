schema:
  - graph/schema/*.graphqls

exec:
  filename: graph/generated/generated.go
  package: generated

model:
  filename: graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: graph
  package: graph
  filename_template: "{name}.resolvers.go"

autobind: []

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Time:
    model: github.com/99designs/gqlgen/graphql.Time
  Diagram:
    fields:
      createdByActor:
        resolver: true
      updatedByActor:
        resolver: true
      previewImageUrl:
        resolver: true
  DiagramImage:
    fields:
      imageUrl:
        resolver: true
  Frame:
    fields:
      screenshotImageUrl:
        resolver: true
      createdByActor:
        resolver: true
      updatedByActor:
        resolver: true
  DiagramVersion:
    fields:
      createdByActor:
        resolver: true
  Service:
    fields:
      createdByActor:
        resolver: true
      updatedByActor:
        resolver: true
  ServiceDB:
    fields:
      createdByActor:
        resolver: true
      updatedByActor:
        resolver: true
  ServiceDBVersion:
    fields:
      createdByActor:
        resolver: true
  APIGroupVersion:
    fields:
      createdByActor:
        resolver: true
